services:
  redis:
    image: redis:7-alpine
    container_name: queue-redis
    platform: linux/amd64
    ports:
      - "6379:6379"
    volumes:
      - queue-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  queue-redis-data:
